<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE友だち追加</title>
  <style>
    /* 全体の背景（アイボリー・白系） */
    body {
      background-color: #f9f6f0; 
      color: #4a3f35; /* 濃いめのブラウンで文字を読みやすく */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
      padding: 20px 15px;
      margin: 0;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    .greeting {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 25px;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    /* LINE追加ボタン（優しい緑に） */
    .line-btn {
      display: block;
      background-color: #61bb7d; 
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      padding: 16px 0;
      border-radius: 35px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(97, 187, 125, 0.2);
      transition: background-color 0.2s;
    }
    .or-text {
      color: #a39585;
      font-size: 13px;
      margin: 20px 0;
    }
    /* ボックス（白）と枠線（ベージュブラウン） */
    .box {
      background-color: #ffffff;
      border: 1px solid #e6ded4;
      border-radius: 24px;
      padding: 30px 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(74, 63, 53, 0.03);
    }
    .box-title {
      color: #8c7662; /* ベージュブラウン */
      font-size: 20px;
      font-weight: bold;
      margin-top: 0;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .box-subtitle {
      color: #a39585;
      font-size: 12px;
      margin-bottom: 20px;
    }
    /* ID表示部分（薄いアイボリー） */
    .id-display {
      background-color: #fbf9f6;
      border: 1px solid #f0eae1;
      font-size: 26px;
      font-weight: bold;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 15px;
      letter-spacing: 1px;
      color: #5c4e40;
    }
    /* コピーボタン（ベージュブラウン） */
    .copy-btn {
      background-color: #8c7662; 
      color: #ffffff;
      border: none;
      font-weight: bold;
      font-size: 14px;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(140, 118, 98, 0.2);
    }
    .steps {
      text-align: left;
      padding-left: 5px;
      margin-top: 25px;
      font-size: 14px;
      color: #6e5f51;
      line-height: 2;
    }
    .qr-img {
      width: 75%;
      max-width: 200px;
      border-radius: 16px;
      margin-top: 10px;
      background-color: #fff;
      padding: 5px;
      border: 1px solid #e6ded4;
    }
  </style>
</head>
<body>

<div class="container">
  <p class="greeting">ONE講師の福島です！<br>それぞれにあったアドバイスをさせて頂きます！</p>

  <a href="https://lin.ee/QNi1Zyg" class="line-btn">友だち追加する</a>

  <div class="or-text">または</div>

  <div class="box">
    <div class="box-title">LINE IDで追加</div>
    <div class="box-subtitle">LINEアプリの検索からも追加できます</div>
    
    <div class="id-display" id="line-id">@087yxxkc</div>
    
    <button class="copy-btn" onclick="copyId()">LINE IDをコピー</button>

    <div class="steps">
      <div>1. LINEアプリを開く</div>
      <div>2. ホーム右上の「友だち追加」を押す</div>
      <div>3. 「検索」を押す</div>
      <div>4. 「<span style="color:#8c7662; font-weight:bold;">@087yxxkc</span>」を入力して追加する</div>
    </div>
  </div>

  <div class="box">
    <div class="box-title">QRコードで追加</div>
    <div class="box-subtitle">直接読み取るか、保存して追加できます</div>
    <img src="qr-code.png" alt="LINE QRコード" class="qr-img">
  </div>
</div>

<script>
function copyId() {
  const idText = document.getElementById('line-id').innerText;
  navigator.clipboard.writeText(idText).then(() => {
    alert('LINE ID（' + idText + '）をコピーしました！');
  }).catch(err => {
    const target = document.createElement("textarea");
    target.value = idText;
    document.body.appendChild(target);
    target.select();
    document.execCommand("copy");
    document.body.removeChild(target);
    alert('LINE ID（' + idText + '）をコピーしました！');
  });
}
</script>

</body>
</html>
