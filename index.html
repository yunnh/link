<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE友だち追加</title>
  <style>
    body {
      background-color: #0b0b0b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
      padding: 20px 15px;
      margin: 0;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    .greeting {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 25px;
      line-height: 1.6;
      letter-spacing: 0.5px;
    }
    .line-btn {
      display: block;
      background-color: #34aad6; /* 仮の色：実際はお好きな色やLINEの緑に */
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      padding: 16px 0;
      border-radius: 35px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(52, 170, 214, 0.3);
      transition: background-color 0.2s;
    }
    .or-text {
      color: #777777;
      font-size: 13px;
      margin: 20px 0;
    }
    .box {
      background-color: #171719;
      border: 1px solid #232326;
      border-radius: 24px;
      padding: 30px 20px;
      margin-bottom: 20px;
    }
    .box-title {
      color: #d1a85c;
      font-size: 20px;
      font-weight: bold;
      margin-top: 0;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .box-subtitle {
      color: #8a8a8f;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .id-display {
      background-color: #242426;
      font-size: 26px;
      font-weight: bold;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    .copy-btn {
      background-color: #d1a85c;
      color: #0b0b0b;
      border: none;
      font-weight: bold;
      font-size: 14px;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(209, 168, 92, 0.2);
    }
    .steps {
      text-align: left;
      padding-left: 5px;
      margin-top: 25px;
      font-size: 14px;
      color: #cccccc;
      line-height: 2;
    }
    .qr-img {
      width: 75%;
      max-width: 200px;
      border-radius: 16px;
      margin-top: 10px;
      background-color: #fff;
      padding: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <p class="greeting">ONE講師の畠中です！<br>皆さんとお話しできることを楽しみにしています😊</p>

  <a href="ここにあなたのLINE友だち追加URLを入れる" class="line-btn" style="background-color: #06c755; box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);">友だち追加する</a>

  <div class="or-text">または</div>

  <div class="box">
    <div class="box-title">LINE IDで追加</div>
    <div class="box-subtitle">LINEアプリの検索からも追加できます</div>
    
    <div class="id-display" id="line-id">@736miafr</div>
    
    <button class="copy-btn" onclick="copyId()">LINE IDをコピー</button>

    <div class="steps">
      <div>1. LINEアプリを開く</div>
      <div>2. ホーム右上の「友だち追加」を押す</div>
      <div>3. 「検索」を押す</div>
      <div>4. 「<span style="color:#d1a85c; font-weight:bold;">@736miafr</span>」を入力して追加する</div>
    </div>
  </div>

  <div class="box">
    <div class="box-title">QRコードで追加</div>
    <div class="box-subtitle">直接読み取るか、保存して追加できます</div>
    <img src="qr-code.png" alt="LINE QRコード" class="qr-img">
  </div>
</div>

<script>
function copyId() {
  const idText = document.getElementById('line-id').innerText;
  navigator.clipboard.writeText(idText).then(() => {
    alert('LINE ID（' + idText + '）をコピーしました！');
  }).catch(err => {
    // 予備のコピー方法
    const target = document.createElement("textarea");
    target.value = idText;
    document.body.appendChild(target);
    target.select();
    document.execCommand("copy");
    document.body.removeChild(target);
    alert('LINE ID（' + idText + '）をコピーしました！');
  });
}
</script>

</body>
</html>
